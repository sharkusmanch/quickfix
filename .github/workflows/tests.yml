name: Tests

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'conftest.py'
  push:
    branches: [master]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'conftest.py'

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest requests
      - run: python -m pytest -v
